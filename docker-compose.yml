version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: farmershop_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: farmer_shopping
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: farmershop_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/farmer_shopping
      - SECRET_KEY=your_production_secret_key_change_me
      - APP_NAME=Farmer Shop API
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: farmershop_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
